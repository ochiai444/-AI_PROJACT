<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>

    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🔑 로그인</h1>

    <div class="card">

        <input id="username" placeholder="아이디">

        <input id="password"
               type="password"
               placeholder="비밀번호">

        <button onclick="login()">
            로그인
        </button>

        <p id="login-result"></p>

    </div>

    <div class="card">
        <button onclick="location.href='/web'">
            ← 메인으로
        </button>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
